apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sausage-store
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}
        envFrom:
          - secretRef:
              name: mongodb-secret
        ports:
        - containerPort: {{ .Values.mongodb.containerPort }}
        resources:
{{ toYaml .Values.mongodb.resources | indent 10 }}
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.mongodb.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  ports:
  - port: {{ .Values.mongodb.containerPort }}
    targetPort: {{ .Values.mongodb.containerPort }}
  selector:
    app: mongodb
  clusterIP: None
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "{{ .Values.mongodb.env.MONGO_INITDB_ROOT_USERNAME }}"
  MONGO_INITDB_ROOT_PASSWORD: "{{ .Values.mongodb.env.MONGO_INITDB_ROOT_PASSWORD }}"
  MONGO_REPORTS_USERNAME: "{{ .Values.mongodb.env.MONGO_REPORTS_USERNAME }}"
  MONGO_REPORTS_PASSWORD: "{{ .Values.mongodb.env.MONGO_REPORTS_PASSWORD }}"
  MONGO_REPORTS_DATABASE: "{{ .Values.mongodb.env.MONGO_REPORTS_DATABASE }}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-reports-user
  annotations:
    helm.sh/hook: "post-install,post-upgrade"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: mongodb-init-reports-user
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init-reports-user
          image: {{ .Values.mongodb.image }}
          envFrom:
            - secretRef:
                name: mongodb-secret
          command:
            - /bin/sh
            - -c
            - |
              until mongosh --host mongodb --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping')"; do
                sleep 5
              done
              mongosh --host mongodb --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin <<EOF
              db = db.getSiblingDB("$MONGO_REPORTS_DATABASE");
              if (!db.getUser("$MONGO_REPORTS_USERNAME")) {
                db.createUser({
                  user: "$MONGO_REPORTS_USERNAME",
                  pwd: "$MONGO_REPORTS_PASSWORD",
                  roles: [{ role: "readWrite", db: "$MONGO_REPORTS_DATABASE" }]
                });
              }
              EOF
